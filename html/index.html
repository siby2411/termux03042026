<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Principal des Applications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body>
    <div class="bg-white p-8 md:p-12 rounded-xl shadow-2xl max-w-lg w-full text-center">
        <!-- Titre -->
        <h1 class="text-3xl font-bold text-gray-800 mb-6">
            Portail des Applications
        </h1>
        
        <!-- Message informatif -->
        <div class="mb-8 p-4 bg-yellow-100 border-l-4 border-yellow-500 text-yellow-800 rounded-md">
            <p class="text-sm font-medium">
                ⚠️ L'application "Gestion Commerciale" est manquante.
            </p>
        </div>
        
        <!-- Bouton vers l'application fonctionnelle -->
        <a href="/ecole/"
           class="inline-block w-full px-6 py-3 text-lg font-semibold text-white bg-indigo-600 rounded-lg transition duration-300 ease-in-out hover:bg-indigo-700 shadow-md hover:shadow-lg">
            Accéder à la Gestion École
        </a>
    </div>
</body>
</html>
