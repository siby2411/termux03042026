<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Envoi Mail Intranet</title>
</head>
<body>

    <h2>Formulaire de Test Mail (POST)</h2>
    <form action="mail.php" method="POST">
        
        <label for="nom">Votre Nom:</label><br>
        <input type="text" id="nom" name="nom" required><br><br>

        <label for="email">Votre Email (Réponse):</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="sujet">Sujet du Message:</label><br>
        <input type="text" id="sujet" name="sujet" required><br><br>
        
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="5" required></textarea><br><br>
        
        <input type="submit" value="Envoyer le Mail">
    </form>

</body>
</html>
