<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Insertion Écriture</title>
    <style>
        .form-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background-color: #f9f9f9;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }
        .form-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
        }
        .form-label {
            font-weight: bold;
        }
        .form-control {
            margin-bottom: 15px;
        }
        .btn-submit {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border-color: #007bff;
            color: white;
            font-size: 18px;
            border-radius: 5px;
        }
        .btn-submit:hover {
            background-color: #0056b3;
            border-color: #004085;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-container">
        <div class="form-title">Insertion d'une Écriture Comptable</div>
        <form action="inserer_ecriture.php" method="POST">
            <div class="mb-3">
                <label for="date_operation" class="form-label">Date de l'opération :</label>
                <input type="date" class="form-control" id="date_operation" name="date_operation" required>
            </div>
            <div class="mb-3">
                <label for="compte_debit" class="form-label">Compte Débit :</label>
                <input type="text" class="form-control" id="compte_debit" name="compte_debit" required>
            </div>
            <div class="mb-3">
                <label for="compte_credit" class="form-label">Compte Crédit :</label>
                <input type="text" class="form-control" id="compte_credit" name="compte_credit" required>
            </div>
            <div class="mb-3">
                <label for="montant" class="form-label">Montant :</label>
                <input type="number" step="0.01" class="form-control" id="montant" name="montant" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description :</label>
                <input type="text" class="form-control" id="description" name="description">
            </div>
            <button type="submit" class="btn btn-submit">Enregistrer l'écriture</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
