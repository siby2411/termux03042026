<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilan d'Ouverture</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Bilan d'Ouverture</h2>
    <form action="bilan_ouverture.php" method="POST">
        <div class="form-group">
            <label for="element_bilan">Éléments du Bilan:</label>
            <select class="form-control" id="element_bilan" name="element_bilan" required>
                <option value="" disabled selected>-- Sélectionnez un élément --</option>
                
                <!-- Rubriques Actif -->
                <optgroup label="Actif">
                    <option value="Trésorerie">Trésorerie</option>
                    <option value="Créances Clients">Créances Clients</option>
                    <option value="Stocks">Stocks</option>
                    <option value="Immobilisations Corporelles">Immobilisations Corporelles</option>
                    <option value="Immobilisations Incorporelles">Immobilisations Incorporelles</option>
                    <option value="Autres Actifs">Autres Actifs</option>
                </optgroup>
                
                <!-- Rubriques Passif -->
                <optgroup label="Passif">
                    <option value="Dettes Fournisseurs">Dettes Fournisseurs</option>
                    <option value="Emprunts à Long Terme">Emprunts à Long Terme</option>
                    <option value="Emprunts à Court Terme">Emprunts à Court Terme</option>
                    <option value="Capitaux Propres">Capitaux Propres</option>
                    <option value="Autres Passifs">Autres Passifs</option>
                </optgroup>
            </select>
        </div>
        <div class="form-group">
            <label for="montant">Montant:</label>
            <input type="number" class="form-control" id="montant" name="montant" required>
        </div>
        <button type="submit" class="btn btn-primary">Ajouter au Bilan</button>
    </form>
</div>
</body>
</html>
